# 崩溃恢复测试配置
# 测试场景：验证进程崩溃后 WAL 恢复和幂等性缓存

logging:
  level: debug
  format: json

exactly_once:
  enabled: true
  transaction:
    wal:
      wal_dir: "./target/test/crash-recovery/wal"
      max_file_size: 10485760
      sync_on_write: true
      compression: false
    idempotency:
      cache_size: 10000
      ttl: "3600s"
      persist_path: "./target/test/crash-recovery/idempotency.json"
      persist_interval: "60s"
    transaction_timeout: "30s"

health_check:
  enabled: true
  address: "0.0.0.0:8081"

metrics:
  enabled: true
  address: "0.0.0.0:9091"
  endpoint: "/metrics"

streams:
  - name: "crash-recovery-test"
    input:
      type: "kafka"
      brokers:
        - "localhost:9092"
      topics:
        - "test-input"
      consumer_group: "crash-recovery-group"
      start_from_latest: false

    pipeline:
      thread_num: 2
      processors: []

    output:
      type: "kafka"
      brokers:
        - "localhost:9092"
      topic: { type: "value", value: "test-output" }
