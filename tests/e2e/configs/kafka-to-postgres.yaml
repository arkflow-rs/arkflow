# 端到端测试：Kafka -> PostgreSQL (UPSERT支持)
# 测试场景：验证SQL UPSERT幂等性

logging:
  level: debug
  format: json

exactly_once:
  enabled: true
  transaction_coordinator:
    timeout: 30s
  wal:
    path: "/tmp/arkflow/e2e/kafka-to-postgres/wal"
    max_size: 10485760
    sync_on_write: true
    compression: false
  idempotency:
    capacity: 10000
    ttl: 3600s
    persistence_path: "/tmp/arkflow/e2e/kafka-to-postgres/idempotency"

health_check:
  enabled: true
  address: "0.0.0.0:8083"

metrics:
  enabled: true
  address: "0.0.0.0:9093"
  endpoint: "/metrics"

streams:
  # 从Kafka消费并写入PostgreSQL（UPSERT）
  - name: "kafka-to-postgres-upsert"
    input:
      type: "kafka"
      config:
        brokers:
          - "localhost:9092"
        topics:
          - "test-input"
        consumer_group: "e2e-test-postgres-group"
        start_from_latest: false

    pipeline:
      thread_num: 2
      processors:
        - type: "sql"
            query: |
              SELECT
                id::text as order_id,
                customer_id::text,
                product_id::text,
                quantity::integer,
                price::decimal,
                CONCAT('idempotency-', id::text, '-', __meta_partition::text, '-', __meta_offset::text) as idempotency_key
              FROM flow

    output:
      type: "sql"
      config:
        driver: "postgres"
        dsn: "postgres://arkflow:arkflow123@localhost:5432/arkflow_test"
        table: "orders"
        batch_size: 100
        idempotency_key_column: "idempotency_key"
