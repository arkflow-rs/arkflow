# 端到端测试：Kafka -> HTTP (幂等性支持)
# 测试场景：验证HTTP幂等性通过Idempotency-Key header

logging:
  level: debug
  format: json

exactly_once:
  enabled: true
  transaction_coordinator:
    timeout: 30s
  wal:
    path: "./target/test/http-wal"
    max_size: 10485760
    sync_on_write: true
    compression: false
  idempotency:
    capacity: 10000
    ttl: 3600s
    persistence_path: "./target/test/http-idempotency"

health_check:
  enabled: true
  address: "0.0.0.0:8082"

metrics:
  enabled: true
  address: "0.0.0.0:9092"
  endpoint: "/metrics"

streams:
  # 从Kafka消费并写入HTTP（幂等性）
  - name: "kafka-to-http-idempotent"
    input:
      type: "kafka"
      config:
        brokers:
          - "localhost:9092"
        topics:
          - "test-input"
        consumer_group: "e2e-test-http-group"
        start_from_latest: false

    pipeline:
      thread_num: 2
      processors:
        - type: "sql"
            query: |
              SELECT
                *,
                'http-destination' as target,
                __meta_timestamp as processed_at
              FROM flow

    output:
      type: "http"
      config:
        url: "http://localhost:8080"
        method: "POST"
        headers:
          Content-Type: "application/json"
          X-Test-Source: "arkflow-e2e"
        batch_size: 1
        timeout: 30s
