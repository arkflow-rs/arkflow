# 简化配置：直接传递，使用空处理器

logging:
  level: info
  format: json

streams:
  - name: "kafka-to-kafka-simple"
    input:
      type: "kafka"
      brokers:
        - "localhost:9092"
      topics:
        - "test-input"
      consumer_group: "e2e-test-simple"
      start_from_latest: false

    pipeline:
      thread_num: 1
      processors: []

    output:
      type: "kafka"
      brokers:
        - "localhost:9092"
      topic: { type: "value", value: "test-output" }
